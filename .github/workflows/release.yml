name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write          # needed by softprops/action-gh-release to create releases
  id-token: write          # OIDC token for keyless Cosign signing
  attestations: write      # cosign attest
  security-events: write   # upload SARIF to GitHub Security tab

jobs:
  # Tests are run in CI (ci.yml) which gates tag pushes; no need to repeat here.

  # ── 1. Binary builds (matrix) ───────────────────────────────────────────────
  build-binaries:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }}${{ matrix.goarm && format('v{0}', matrix.goarm) || '' }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: cs-unifi-bouncer-pro-linux-amd64
          - goos: linux
            goarch: arm64
            artifact: cs-unifi-bouncer-pro-linux-arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            artifact: cs-unifi-bouncer-pro-linux-armv7
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          go build \
            -ldflags="-s -w \
              -X main.Version=${{ github.ref_name }} \
              -X main.Commit=${{ github.sha }} \
              -X main.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -trimpath \
            -o "${{ matrix.artifact }}" \
            ./cmd/bouncer

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  # ── 2. Docker security scan ─────────────────────────────────────────────────
  docker-scan:
    name: Docker Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Build image for scanning (linux/amd64 only)
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v5
        with:
          context: .
          platforms: linux/amd64
          load: true
          push: false
          tags: local:scan
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.34.1
        with:
          image-ref: local:scan
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          version: v0.69.2
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ── 3. Multi-arch Docker push ────────────────────────────────────────────────
  docker-push:
    name: Docker Push
    runs-on: ubuntu-latest
    needs: [docker-scan]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130  # v3

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac  # v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5
        with:
          images: developingchet/cs-unifi-bouncer-pro
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}

      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM (CycloneDX)
        timeout-minutes: 10
        uses: anchore/sbom-action@17ae1740179002c89186b61233e0f892c3118b11  # v0
        with:
          image: developingchet/cs-unifi-bouncer-pro@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: cs-unifi-bouncer-pro.sbom.cyclonedx.json

      - name: Sign image with Cosign (keyless OIDC)
        run: |
          cosign sign --yes \
            developingchet/cs-unifi-bouncer-pro@${{ steps.build.outputs.digest }}

      - name: Attach SBOM attestation
        run: |
          cosign attest --yes \
            --predicate cs-unifi-bouncer-pro.sbom.cyclonedx.json \
            --type cyclonedx \
            developingchet/cs-unifi-bouncer-pro@${{ steps.build.outputs.digest }}

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: cs-unifi-bouncer-pro.sbom.cyclonedx.json
          if-no-files-found: error

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@432a30c9e07499fd01da9f8a49f0faf9e0ca5b77  # v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          repository: developingchet/cs-unifi-bouncer-pro
          readme-filepath: ./DOCKERHUB.md

  # ── 4. GitHub Release ────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, docker-push]
    steps:
      - uses: actions/checkout@v4

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom-cyclonedx
          path: dist/

      - name: Generate checksums
        working-directory: dist/
        run: sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b  # v2
        with:
          generate_release_notes: true
          body: |
            ## Docker

            ```bash
            docker pull developingchet/cs-unifi-bouncer-pro:${{ github.ref_name }}
            ```

            Multi-arch image (linux/amd64, linux/arm64, linux/arm/v7) published to Docker Hub.

            ## Supply-chain verification

            This image is signed with [Cosign](https://docs.sigstore.dev/cosign/overview/) (keyless OIDC):

            ```bash
            cosign verify developingchet/cs-unifi-bouncer-pro:${{ github.ref_name }} \
              --certificate-identity-regexp="https://github.com/developingchet/cs-unifi-bouncer-pro/.github/workflows/release.yml@refs/tags/.*" \
              --certificate-oidc-issuer="https://token.actions.githubusercontent.com"
            ```

            A CycloneDX SBOM is attached to this release and embedded as a Cosign attestation on the image.
          files: |
            dist/cs-unifi-bouncer-pro-linux-amd64
            dist/cs-unifi-bouncer-pro-linux-arm64
            dist/cs-unifi-bouncer-pro-linux-armv7
            dist/cs-unifi-bouncer-pro.sbom.cyclonedx.json
            dist/checksums.txt
