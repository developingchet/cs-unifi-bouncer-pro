apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cs-unifi-bouncer-pro
  namespace: crowdsec
spec:
  podSelector:
    matchLabels:
      app: cs-unifi-bouncer-pro
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow Prometheus scrapers to reach the metrics endpoint.
    - ports:
        - protocol: TCP
          port: 9090
    # Allow kubelet liveness/readiness probes.
    - ports:
        - protocol: TCP
          port: 8081

  egress:
    # Allow DNS resolution (required by all egress connections).
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow egress to the UniFi controller (HTTPS).
    - ports:
        - protocol: TCP
          port: 443
    # Allow egress to CrowdSec LAPI (default port 8080).
    - ports:
        - protocol: TCP
          port: 8080
