apiVersion: v1
kind: Secret
metadata:
  name: cs-unifi-bouncer-pro
  namespace: crowdsec
type: Opaque
stringData:
  # UniFi controller credentials — use ONE of: API key or username+password
  UNIFI_URL: "https://192.168.1.1"
  UNIFI_API_KEY: ""
  UNIFI_USERNAME: "bouncer"
  UNIFI_PASSWORD: "changeme"
  UNIFI_VERIFY_TLS: "false"

  # CrowdSec LAPI
  CROWDSEC_LAPI_URL: "http://crowdsec-service:8080"
  CROWDSEC_LAPI_KEY: "changeme"

  # Firewall configuration
  UNIFI_SITES: "default"
  FIREWALL_MODE: "auto"
  ZONE_PAIRS: "External->Internal"
